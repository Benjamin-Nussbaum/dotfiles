# See https://wiki.hyprland.org/Configuring/Monitors/
monitor=,preferred,auto,auto
monitor=HDMI-A-1,1920x1080,auto,1.3
# monitor=DP-2,preferred,auto,auto

$barPrg = waybar
$term = kitty -1
$fileManager = lf
$menu = wofi --show drun
$audioMixer = pulsemixer
$procViewer = htop

exec-once = dunst                             # Notifications
exec-once = setbg                             # Set wallpaper (see ~/.local/bin/setbg)
exec-once = $barPrg                           # System status bar
exec-once = gammastep-indicator -l manual     # Blue light filter (system tray)
exec-once = hypridle                          # Idle daemon

exec-once = [workspace 1] librewolf
exec-once = [workspace 2 silent] firefox
exec-once = [workspace special:scratchpad silent] $term

# Source a file (multi-file configs)
# source = ~/.config/hypr/myColors.conf

# Some default env vars.
env = XCURSOR_SIZE,24
env = HYPRCURSOR_SIZE,24
env = QT_QPA_PLATFORMTHEME,qt5ct # change to qt6ct if you have that
env = WLR_DRM_NO_ATOMIC,1
env = MOZ_ENABLE_WAYLAND,1


# https://wiki.hyprland.org/Configuring/Variables/#general
general {
    layout = scrolling

    gaps_in = 0
    gaps_out = 0
    border_size = 1
    col.active_border = rgba(1affffee)
    col.inactive_border = rgba(595959aa)
    
    resize_on_border = true
    # Please see https://wiki.hyprland.org/Configuring/Tearing/ before you turn this on
    allow_tearing = true
}

# https://wiki.hyprland.org/Configuring/Variables/#decoration
decoration {
    rounding = 0
    blur:enabled = false
    shadow:enabled = false
}

# https://wiki.hyprland.org/Configuring/Variables/#animations
# https://wiki.hyprland.org/Configuring/Animations/
animations {
    enabled = true

    bezier = linear,0,0,1,1
    bezier = almostLinear,0.5,0.5,0.75,1.0
    bezier = quick,0.15,0,0.1,1

    animation = windows, 1, 2, quick, popin 80%
    animation = border, 1, 2, quick
    animation = fade, 1, 2, quick
    animation = workspaces, 1, 1, almostLinear
    animation = specialWorkspace, 1, 0.75, quick, slidefadevert -5%
}

# See https://wiki.hyprland.org/Configuring/Master-Layout/ for more
master {
    new_status = inherit
    special_scale_factor = 0.7
}

scrolling {
}

# https://wiki.hyprland.org/Configuring/Variables/#misc
misc {
    disable_hyprland_logo = true
    disable_splash_rendering = true
    enable_swallow = true
    on_focus_under_fullscreen = 1
    swallow_regex = ^(kitty)$
    swallow_exception_regex = (nvim|wev)
    vfr = true
}


# https://wiki.hyprland.org/Configuring/Variables/#input
input {
    repeat_rate = 50
    repeat_delay = 240

    kb_layout = us,us
    kb_variant = ,colemak_dh

    # Map menu to super (caps to super/esc mapped in /etc/keyd/default.conf)
    kb_options = altwin:menu_win, compose:paus, grp:sclk_toggle, grp_led:caps
}

# See https://wiki.hypr.land/Configuring/Gestures
gesture = 3, horizontal, workspace

# https://wiki.hyprland.org/Configuring/Variables/#gestures
gestures {
    workspace_swipe_invert = false
    workspace_swipe_min_speed_to_force = 4
    workspace_swipe_forever = true
}

# See https://wiki.hyprland.org/Configuring/Keywords/
$mainMod = SUPER

# Example binds, see https://wiki.hyprland.org/Configuring/Binds/ for more
bind = $mainMod, return, exec, $term
bind = $mainMod SHIFT, return, togglespecialworkspace, scratchpad
bind = $mainMod, Q, killactive,
bind = $mainMod, W, exec, $BROWSER
bind = $mainMod SHIFT, W, exec, $term -e sudo nmtui
bind = $mainMod SHIFT, backspace, exit,
# bind = $mainMod, E, exec, $term -e neomutt  # email
bind = $mainMod, R, exec, $term -e $fileManager
bind = $mainMod SHIFT, R, exec, $term -e $procViewer

# Swap layout of current workspace (see ~/.local/bin/setlayout)
bind = $mainMod, T, exec, setlayout "master"
bind = $mainMod, Y, exec, setlayout "scrolling"
bind = $mainMod, U, exec, setlayout "monocle"

bind = $mainMod, O, layoutmsg, addmaster
bind = $mainMod SHIFT, O, layoutmsg, removemaster
bind = $mainMod CTRL, O, layoutmsg, orientationnext
bind = $mainMod SHIFT CTRL, O, layoutmsg, orientationprev
bind = $mainMod, P, layoutmsg, promote

bind = $mainMod, D, exec, $menu
bind = $mainMod ALT, D, exec, def
bind = $mainMod, F, fullscreen, 0
bind = $mainMod ALT, F, fullscreen, 1
bind = $mainMod CTRL, F, fullscreenstate, 0 2
# Move focus with mainMod + vim keys
bind = $mainMod, H, movefocus, l
bind = $mainMod SHIFT, H, layoutmsg, swapcol l
# bind = $mainMod, J, movefocus, d
# bind = $mainMod, K, movefocus, u
bind = $mainMod, J, layoutmsg, cyclenext
bind = $mainMod, K, layoutmsg, cycleprev
bind = $mainMod, L, movefocus, r
bind = $mainMod SHIFT, L, layoutmsg, swapcol r

bind = $mainMod, B, exec, pkill $barPrg || $barPrg  # Toggle/reload bar

# Screenshot script (see ~/.local/bin/grimpick)
bind = SHIFT, Print, exec, grimpick

bind = $mainMod, space, layoutmsg, swapwithmaster
bind = $mainMod, space, layoutmsg, colresize +conf
bind = $mainMod ALT, space, layoutmsg, colresize -conf
bind = $mainMod SHIFT, space, togglefloating,

# Switch workspaces with mainMod + [0-9]
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

# Move active window to a workspace with mainMod + SHIFT + [0-9]
bind = $mainMod SHIFT, 1, movetoworkspacesilent, 1
bind = $mainMod SHIFT, 2, movetoworkspacesilent, 2
bind = $mainMod SHIFT, 3, movetoworkspacesilent, 3
bind = $mainMod SHIFT, 4, movetoworkspacesilent, 4
bind = $mainMod SHIFT, 5, movetoworkspacesilent, 5
bind = $mainMod SHIFT, 6, movetoworkspacesilent, 6
bind = $mainMod SHIFT, 7, movetoworkspacesilent, 7
bind = $mainMod SHIFT, 8, movetoworkspacesilent, 8
bind = $mainMod SHIFT, 9, movetoworkspacesilent, 9
bind = $mainMod SHIFT, 0, movetoworkspacesilent, 10

# Scroll through existing workspaces with mainMod + scroll
bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up, workspace, e-1

# Move/resize windows with mainMod + LMB/RMB and dragging
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

bind = $mainMod, F4, exec, pkill $audioMixer || $term --title "$audioMixer" -e $audioMixer
bindel = ,XF86AudioRaiseVolume, exec, wpctl set-volume -l 1.5 @DEFAULT_AUDIO_SINK@ 5%+
bindel = ,XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindel = ,XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindel = ,XF86AudioMicMute, exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle
bindel = ,XF86MonBrightnessUp, exec, brightnessctl -e4 -n2 set 5%+
bindel = ,XF86MonBrightnessDown, exec, brightnessctl -e4 -n2 set 5%-

# Requires playerctl
bindl = ,XF86AudioNext, exec, playerctl next
bindl = ,XF86AudioPause, exec, playerctl play-pause
bindl = ,XF86AudioPlay, exec, playerctl play-pause
bindl = ,XF86AudioPrev, exec, playerctl previous


# See https://wiki.hyprland.org/Configuring/Window-Rules/ for more
# See https://wiki.hyprland.org/Configuring/Workspace-Rules/ for workspace rules

windowrule {
    # Ignore maximize requests from all apps. You'll probably like this.
    name = suppress-maximize-events
    match:class = .*

    suppress_event = maximize
}

windowrule {
    # Fix some dragging issues with XWayland
    name = fix-xwayland-drags
    match:class = ^$
    match:title = ^$
    match:xwayland = true
    match:float = true
    match:fullscreen = false
    match:pin = false

    no_focus = true
}

windowrule {
    name = float-utility-windows
    match:title = $audioMixer|$procViewer

    size = (monitor_w*0.6) (monitor_h*0.6)
    center = true
    float = true
    opacity = 0.90
}

windowrule = match:class ^(mpv|Clone Hero)$, immediate = true

windowrule = match:workspace special:scratchpad, opacity 0.85

windowrule = match:title tmatrix, opacity 0.65
windowrule = match:title tmatrix, fullscreen true

workspace = 1, monitor:DP-2
workspace = special:scratchpad, layout:dwindle
dwindle:special_scale_factor = 0.7
